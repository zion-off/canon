services:
  mongo:
    container_name: canon-mongo
    image: mongodb/mongodb-atlas-local:latest
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

  backend:
    container_name: canon-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: no
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .venv/
        - action: rebuild
          path: ./backend/pyproject.toml
    environment:
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/canon}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CANON_REASONING_MODEL=${CANON_REASONING_MODEL:-gemini-3.1-pro}
      - CANON_FAST_MODEL=${CANON_FAST_MODEL:-gemini-3.1-flash}
      - CANON_EMBEDDING_MODEL=${CANON_EMBEDDING_MODEL:-text-embedding-004}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    container_name: canon-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: no
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json
    environment:
      - API_URL=${API_URL:-http://backend:8000}
    depends_on:
      - backend

volumes:
  mongo-data:
