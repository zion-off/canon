services:
  mongo:
    container_name: canon-mongo
    hostname: mongodb
    image: mongodb/mongodb-atlas-local:latest
    tty: true
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
      - mongo-configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping') && rs.status().myState === 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    ports:
      - "27117:27017"

  backend:
    container_name: canon-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    tty: true
    restart: unless-stopped
    ports:
      - "8400:8000"
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/credentials.json:ro
      - ../backend:/app
      - /app/.venv
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3200}
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/credentials.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/canon}
      - JWT_SECRET=${JWT_SECRET}
      - CANON_REASONING_MODEL=${CANON_REASONING_MODEL:-gemini-3.1-pro}
      - CANON_FAST_MODEL=${CANON_FAST_MODEL:-gemini-3.1-flash}
      - CANON_EMBEDDING_MODEL=${CANON_EMBEDDING_MODEL:-text-embedding-004}
      - COLUMNS=${COLUMNS}
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    container_name: canon-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    tty: true
    restart: unless-stopped
    ports:
      - "3200:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - API_URL=${API_URL:-http://backend:8000}
      - BACKEND_SSE_URL=${BACKEND_SSE_URL:-http://localhost:8400}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - backend

volumes:
  mongo-data:
  mongo-configdb:
