name: cd / frontend

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-cd.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Docker auth
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/canon/frontend:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.CANON_BACKEND_URL }}" \
            -t "$IMAGE" \
            -f frontend/Dockerfile.production \
            frontend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: canon-frontend
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/canon/frontend:${{ github.sha }}
          region: us-central1
          flags: --scaling=1
          env_vars: |-
            API_URL=${{ secrets.CANON_BACKEND_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
