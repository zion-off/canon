name: cd / mcp

on:
  push:
    branches: [main]
    paths:
      - mcp/**
      - .github/workflows/mcp-cd.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        working-directory: mcp
        run: uv build

      - name: Publish to PyPI
        working-directory: mcp
        run: uv publish
